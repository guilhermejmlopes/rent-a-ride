<!doctype html>
<html lang="pt">

<head>
  <meta charset="utf-8">
  <title>Login - Rent-A-Ride</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/style.css"> <!-- teu CSS custom -->

  <style>
    body {
      background-color: #f8f8f8;
      font-family: 'Montserrat', sans-serif;
    }

    .login-container {
      margin-top: 100px;
      max-width: 400px;
      background-color: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    }

    .login-container h2 {
      margin-bottom: 30px;
      text-align: center;
    }

    .form-control {
      border-radius: 4px;
    }

    .btn-login {
      width: 100%;
      border-radius: 4px;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="login-container center-block">
      <h2>Login</h2>
      <form method="POST" action="/login"> <!-- endpoint que ainda podes definir no server -->
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="exemplo@email.com" required>
        </div>
        <div class="form-group">
          <label for="senha">Password:</label>
          <input type="password" class="form-control" id="senha" name="senha" placeholder="********" required>
        </div>
        <button type="submit" class="btn btn-primary btn-login">Entrar</button>
      </form>
      <br>
      <p class="text-center">Ainda não tem conta? <a href="/registro.html">Registe-se aqui</a></p>
    </div>
  </div>

  <!-- jQuery e Bootstrap -->
  <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>

</body>

</html>
